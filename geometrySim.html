<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>GeomShatter — Full Implementation</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <script type="importmap">
    {
        "imports": {
        "three": "https://unpkg.com/three@0.159.0/build/three.module.js",
        "three/addons/": "https://unpkg.com",
        "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
    }
    </script>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            background: #050814;
            color: #e6f5ff;
            font-family: Inter, system-ui, Segoe UI, Arial
        }

        #wrap {
            position: absolute;
            inset: 0;
            overflow: hidden
        }

        canvas {
            display: block
        }

        #ui {
            position: fixed;
            left: 12px;
            top: 12px;
            z-index: 80;
            background: rgba(8, 12, 20, 0.6);
            padding: 12px;
            border-radius: 10px;
            backdrop-filter: blur(4px);
            min-width: 260px
        }

        /* Hamburger Menu Styles */
        #menuBtn {
            background: #3680ff;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
        }

        #menuPanel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            height: 85vh;
            background: rgba(10, 15, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            z-index: 100;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .menu-header {
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .menu-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .menu-sidebar {
            width: 200px;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            overflow-y: auto;
        }

        .category-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: transparent;
            border: none;
            color: #88b8ff;
            text-align: left;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            font-weight: bold;
        }

        .category-btn.active {
            background: rgba(54, 128, 255, 0.2);
            color: #fff;
            border-left: 4px solid #3680ff;
        }

        .menu-content-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .menu-slider {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-pane {
            width: 50%;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
        }

        .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .upgrade-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(54, 128, 255, 0.5);
        }

        .upgrade-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .upgrade-cost { color: #ffeb3b; font-size: 14px; font-weight: bold; }
        
        /* Info Panel */
        #infoPanel { display: flex; flex-direction: column; height: 100%; }
        .back-btn { margin-bottom: 16px; background: transparent; border: none; color: #3680ff; cursor: pointer; font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .info-title { font-size: 24px; font-weight: bold; margin-bottom: 12px; }
        .info-desc { color: #aaa; margin-bottom: 24px; line-height: 1.5; }
        .effects-scroll { flex: 0.5; overflow-y: auto; background: rgba(0, 0, 0, 0.2); border-radius: 8px; padding: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .effect-milestone { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .effect-milestone:last-child { border: none; margin: 0; padding: 0; }
        .buy-area { padding-top: 16px; padding-bottom: 25px; border-top: 1px solid rgba(255,255,255,0.1); text-align: right; }
        .buy-btn-large { background: #3680ff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .buy-btn-large:disabled { opacity: 0.5; cursor: not-allowed; }

        #score {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 6px
        }

        .muted {
            opacity: .8;
            font-size: 12px
        }

        .shop {
            margin-top: 10px
        }

        .upgrade {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px;
            border-radius: 8px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.02)
        }

        .btn {
            background: #3680ff;
            border: none;
            color: white;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer
        }

        .btn:disabled {
            opacity: .4;
            cursor: not-allowed
        }

        #messages {
            position: fixed;
            right: 12px;
            top: 12px;
            z-index: 90;
            max-width: 360px
        }

        .msg {
            background: rgba(10, 10, 18, 0.6);
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 8px
        }

        #hud-bottom {
            position: fixed;
            left: 12px;
            bottom: 12px;
            z-index: 80;
            padding: 8px;
            border-radius: 8px;
            background: rgba(4, 8, 12, 0.6);
            font-size: 13px
        }

        input[type=file] {
            display: none
        }

        .small {
            font-size: 12px;
            opacity: .9
        }

        #prestigeBox {
            margin-top: 8px;
            padding: 8px;
            border-radius: 8px;
            background: linear-gradient(90deg, #131313, #062d3a);
            display: none
        }
    </style>
</head>

<body>
    <div id="wrap"></div>

    <div id="ui">
        <div id="score">Score: 0</div>
        <div class="muted small">Destroyed: <span id="destroyed">0</span></div>
        <div class="muted small">Parsecs: <span id="parsecs">0</span></div>

        <div></div><button id="menuBtn">☰ Menu</button></div>
    </div>
    <div id="menuPanel" style="display:none;">
            <div class="menu-header">
                <div style="font-weight: bold; font-size: 18px;">Upgrades & Save</div>
                <button id="closeMenuBtn" class="btn" style="background: transparent; border: 1px solid #fff;">Close</button>
            </div>
            <div class="menu-body">
                <div class="menu-sidebar" id="categorySidebar">
                    </div>
                <div class="menu-content-wrapper">
                    <div class="menu-slider" id="menuSlider">
                        <div class="menu-pane" id="upgradeListPane">
                            <div id="upgradesContainer"></div>
                            
                            <div style="margin-top:40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                                <div style="margin-bottom:8px" class="small muted">Save State: <span id="saveState">not saved</span></div>
                                <div style="display:flex;gap:8px">

                                </div>
                            </div>
                        </div>

                        <div class="menu-pane" id="infoPanel">
                            <button class="back-btn" id="backToListBtn">← Back</button>
                            <div class="info-title" id="infoTitle">Upgrade Name</div>
                            <div class="info-desc" id="infoDesc">Description goes here.</div>
                            <div style="font-weight: bold; margin-bottom: 8px;">Special Effects:</div>
                            <div class="effects-scroll" id="infoEffects">
                                </div>
                            <div class="buy-area">
                                <div id="infoCost" style="margin-bottom: 8px; color: #ffeb3b; font-weight: bold;">Cost: 0 ⊕</div>
                                <button class="buy-btn-large" id="infoBuyBtn">Purchase</button>
                            </div>
                        </div>
                    </div>

            </div>
        </div>

    <div id="messages"></div>
    <div id="hud-bottom">Tip: Swing to shatter. Use WASD to move around. Open Menu for Upgrades & Saves.</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.159.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.159.0/examples/jsm/controls/OrbitControls.js';
        import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

        /* =========================
           Menu Toggle
           ========================= */
        const menuBtn = document.getElementById('menuBtn');
        const menuPanel = document.getElementById('menuPanel');
        menuBtn.addEventListener('click', () => {
            if (menuPanel.style.display === 'none' || menuPanel.style.display === '') {
                menuPanel.style.display = 'block';
                menuBtn.textContent = '✕ Close Menu';
            } else {
                menuPanel.style.display = 'none';
                menuBtn.textContent = '☰ Menu';
            }
        });

        /* =========================
           Input tracking (WASD)
           ========================= */
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        /* =========================
           Save / Game State
           ========================= */
        const SAVE_KEY = 'geomshatter_save_v4';
        let save = {
            score: 0, destroyed: 0,
            currencies: { quarks: 0, leptons: 0, antimatter: 0, 
                darkmatter: 0, redmatter: 0, strangematter: 0, 
                supereon: 0, planck: 0, parsecs: 0 },
            upgrades: { 
                duplicator: 0, accelerator: 0, qent: 0, nth: 0, cosmic: 0, blackhole: 0,
                superposition: 0, entanglement: 0 
            },
            prestigeUnlocked: false
        };

        function loadSave() {
            try {
                const s = JSON.parse(localStorage.getItem(SAVE_KEY));
                if (s) save = Object.assign(save, s);
            } catch (e) { console.warn('load fail', e); }
        }
        function saveNow() {
            localStorage.setItem(SAVE_KEY, JSON.stringify(save));
            document.getElementById('saveState').textContent = 'saved';
            setTimeout(() => document.getElementById('saveState').textContent = 'saved', 800);
        }
        function resetSave() { if (confirm('Reset save?')) { localStorage.removeItem(SAVE_KEY); location.reload(); } }
        loadSave();

        /* =========================
           Audio
           ========================= */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function touchToUnlockAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
        window.addEventListener('pointerdown', touchToUnlockAudio, { once: true });

        function sfxBeep(freq = 440, t = 0.06, type = 'sine', vol = 0.06) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.value = vol;
            o.connect(g); g.connect(audioCtx.destination);
            o.start();
            o.stop(audioCtx.currentTime + t);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + t);
        }
        function sfxShatter() {
            for (let i = 0; i < 4; i++) setTimeout(() => sfxBeep(200 + Math.random() * 1000, 0.06, 'triangle', 0.03), i * 30);
        }
        function sfxBuy() { sfxBeep(900, 0.12, 'sawtooth', 0.08); }
        function sfxBlackhole() { sfxBeep(110, 0.36, 'sine', 0.12); }

        /* =========================
           THREE + CANNON Setup
           ========================= */
        const wrap = document.getElementById('wrap');
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        wrap.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x041426);

        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);
        camera.position.set(0, 40, 120);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false; controls.enableDamping = true;

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(20, 100, 60);
        light.castShadow = true;
        light.shadow.mapSize.width = 1024;
        light.shadow.mapSize.height = 1024;
        light.shadow.camera.near = 0.5;
        light.shadow.camera.far = 300;
        light.shadow.camera.left = -100;
        light.shadow.camera.right = 100;
        light.shadow.camera.top = 100;
        light.shadow.camera.bottom = -100;
        scene.add(light);
        scene.add(new THREE.HemisphereLight(0x88b8ff, 0x06061a, 0.4));

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.solver.iterations = 10;

        // Stabilize physics to prevent objects from flying off at lightspeed
        const defaultMaterial = new CANNON.Material("default");
        const contactMaterial = new CANNON.ContactMaterial(defaultMaterial, defaultMaterial, {
            friction: 0.8, // Higher friction prevents sliding/kicking
            restitution: 0.0, // Absolutely zero bounce
            contactEquationStiffness: 1e8, // Firm enough to not sink
            contactEquationRelaxation: 3
        });
        world.addContactMaterial(contactMaterial);
        world.defaultMaterial = defaultMaterial;

        // const groundMat = new THREE.MeshStandardMaterial({ color: 0x08101a, roughness: 0.8 });
        // const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), groundMat);
        // groundMesh.rotation.x = -Math.PI / 2;
        // groundMesh.position.y = -50;
        // groundMesh.receiveShadow = true;
        // scene.add(groundMesh);
        
        // var groundShape = new CANNON.Box(new CANNON.Vec3(50, 50, 0.5));
        // const groundBody = new CANNON.Body({ mass: 0, shape: groundShape });
        // groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        // groundBody.position.set(0, -50, 0);
        // world.addBody(groundBody);

        // ground / platform
        const gridGeo = new THREE.PlaneGeometry(400, 400, 80, 80); // High segments for smooth bending
        gridGeo.userData.originalPositions = new Float32Array(gridGeo.attributes.position.array);
        const gridMat = new THREE.MeshBasicMaterial({ color: 0x3680ff, wireframe: true, transparent: true, opacity: 0.4 });
        const groundMesh = new THREE.Mesh(gridGeo, gridMat);
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.position.y = -50;
        scene.add(groundMesh);

        var groundShape = new CANNON.Box(new CANNON.Vec3(200, 200, 0.5));
        const groundBody = new CANNON.Body({ mass: 0, shape: groundShape });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        groundBody.position.set(0, -50, 0);
        world.addBody(groundBody);

        // ground impact/collision behavior
        const groundImpacts = [];
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.8, 6, 6);
        const particleMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

        function spawnGroundParticles(pos, force) {
            const count = Math.min(20, Math.floor(force)); // Limit max particles
            for(let i = 0; i < count; i++) {
                const mesh = new THREE.Mesh(particleGeo, particleMat);
                mesh.position.copy(pos);
                mesh.position.y = -49.5; // Start just above ground
                
                // Randomize size
                const scale = 0.2 + Math.random() * 0.8;
                mesh.scale.setScalar(scale);
                scene.add(mesh);
                
                particles.push({
                    mesh,
                    life: 1.0, // 1 second lifespan
                    vel: new THREE.Vector3((Math.random() - 0.5) * 15, Math.random() * 20 + 5, (Math.random() - 0.5) * 15)
                });
            }
        }

        // Listen for collisions on the ground body
        groundBody.addEventListener('collide', (ev) => {
            const velocity = ev.contact.getImpactVelocityAlongNormal();
            // Only trigger bend on somewhat forceful impacts
            if (Math.abs(velocity) > 10) {
                const contactX = ev.contact.bi.position.x + ev.contact.ri.x;
                const contactZ = ev.contact.bi.position.z + ev.contact.ri.z;
                
                groundImpacts.push({
                    x: contactX,
                    z: contactZ,
                    force: Math.min(Math.abs(velocity), 35), // Cap the force
                    time: 0
                });
                
                // Spawn particles exactly at the contact point
                spawnGroundParticles(new THREE.Vector3(contactX, -49.5, contactZ), Math.abs(velocity));
            }
        });

        const objects = [];
        const debrisObjects = [];

        /* =========================
           Visual Cursor, Raycaster & Trail
           ========================= */
        const cursorRadius = 1.8;
        const cursorGeo = new THREE.SphereGeometry(cursorRadius, 20, 14);
        const cursorMat = new THREE.MeshStandardMaterial({ color: 0x66d1ff, emissive: 0x083b50, metalness: 0.4, roughness: 0.2 });
        const cursorMesh = new THREE.Mesh(cursorGeo, cursorMat);
        cursorMesh.castShadow = true;
        scene.add(cursorMesh);

        const raycaster = new THREE.Raycaster();
        let pointer = { x: 0, y: 0 };
        let prevPointer = { x: 0, y: 0 };

        window.addEventListener('pointermove', e => {
            pointer.x = (e.clientX / innerWidth) * 2 - 1;
            pointer.y = - (e.clientY / innerHeight) * 2 + 1;
        });

        const cursorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -6); // Plane at Y=6
        const planeIntersectPoint = new THREE.Vector3();

        function updateCursorFromPointer() {
            raycaster.setFromCamera(pointer, camera);
            raycaster.ray.intersectPlane(cursorPlane, planeIntersectPoint);
            if (planeIntersectPoint) {
                cursorMesh.position.lerp(planeIntersectPoint, 0.72);
            }
        }

        // SWIPE TRAIL FEATURE
        const trailMaxPts = 12;
        const trailPts = [];
        const trailGeo = new THREE.BufferGeometry();
        // pre-fill with zero vectors
        for (let i = 0; i < trailMaxPts; i++) trailPts.push(new THREE.Vector3());
        trailGeo.setFromPoints(trailPts);
        const trailMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, linewidth: 3 });
        const trailMesh = new THREE.Line(trailGeo, trailMat);
        scene.add(trailMesh);

        function updateTrail(isSlicing) {
            if (isSlicing) {
                trailPts.push(cursorMesh.position.clone());
            } else {
                // gradually retract trail if not slicing
                if (trailPts.length > 0) {
                    const last = trailPts[trailPts.length - 1].clone();
                    trailPts.push(last);
                }
            }
            // Keep trail length constrained
            while (trailPts.length > trailMaxPts) trailPts.shift();
            trailGeo.setFromPoints(trailPts);
        }

        /* =========================
           Shapes & Spawning
           ========================= */
        const rng = (min, max) => Math.random() * (max - min) + min;

        function createPrismMesh(sides = 5, radius = 4, height = 6, color = null) {
            const geom = new THREE.CylinderGeometry(radius, radius, height, sides, 1, false);
            const mat = new THREE.MeshStandardMaterial({
                color: color || new THREE.Color().setHSL(Math.random() * 0.6 + 0.1, 0.6, 0.5),
                flatShading: true
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        function createPlatonicMesh(name) {
            let mesh;
            const mat = new THREE.MeshStandardMaterial({ flatShading: true });
            switch (name) {
                case 'dodeca': mat.color.setHex(0xffb86b); mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(5), mat); break;
                case 'ico': mat.color.setHex(0x99ddff); mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(5), mat); break;
                case 'cube': mat.color.setHex(0xaaffcc); mesh = new THREE.Mesh(new THREE.BoxGeometry(7, 7, 7), mat); break;
                default: mat.color.setHex(0x88aaff); mesh = new THREE.Mesh(new THREE.SphereGeometry(5, 12, 12), mat); break;
            }
            mesh.castShadow = true; mesh.receiveShadow = true;
            return mesh;
        }

        // function attachCannonShape(body, meta) {
        //     if (meta.type === 'prism') {
        //         const shape = new CANNON.Cylinder(meta.radius, meta.radius, meta.height, meta.sides);
        //         const q = new CANNON.Quaternion();
        //         q.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        //         body.addShape(shape, new CANNON.Vec3(0, 0, 0), q);
        //     } else if (meta.type === 'platonic' && meta.pts === 6) {
        //         body.addShape(new CANNON.Box(new CANNON.Vec3(3.5, 3.5, 3.5)));
        //     } else {
        //         body.addShape(new CANNON.Sphere(5));
        //     }
        // }
        function attachCannonShape(body, meta, mesh) {
            // Fast-path perfect match for cubes
            if (meta.type === 'platonic' && meta.pts === 6) { 
                body.addShape(new CANNON.Box(new CANNON.Vec3(3.5, 3.5, 3.5)));
                return;
            }
            
            // For all other shapes, rip the exact geometry from the visual mesh to guarantee 1:1 alignment
            const geo = mesh.geometry;
            const pos = geo.attributes.position.array;
            const vertices = [];
            const faces = [];
            
            // Deduplicate vertices (Three.js geometries use overlapping vertices for UVs)
            const vMap = new Map();
            let vCount = 0;
            const getVertIndex = (x, y, z) => {
                const key = `${x.toFixed(3)}_${y.toFixed(3)}_${z.toFixed(3)}`;
                if (!vMap.has(key)) {
                    vMap.set(key, vCount++);
                    vertices.push(new CANNON.Vec3(x, y, z));
                }
                return vMap.get(key);
            };

            const idx = geo.index ? geo.index.array : null;
            if (idx) {
                for (let i = 0; i < idx.length; i += 3) {
                    const a = getVertIndex(pos[idx[i]*3], pos[idx[i]*3+1], pos[idx[i]*3+2]);
                    const b = getVertIndex(pos[idx[i+1]*3], pos[idx[i+1]*3+1], pos[idx[i+1]*3+2]);
                    const c = getVertIndex(pos[idx[i+2]*3], pos[idx[i+2]*3+1], pos[idx[i+2]*3+2]);
                    if (a !== b && b !== c && a !== c) faces.push([a, b, c]);
                }
            } else {
                for (let i = 0; i < pos.length; i += 9) {
                    const a = getVertIndex(pos[i], pos[i+1], pos[i+2]);
                    const b = getVertIndex(pos[i+3], pos[i+4], pos[i+5]);
                    const c = getVertIndex(pos[i+6], pos[i+7], pos[i+8]);
                    if (a !== b && b !== c && a !== c) faces.push([a, b, c]);
                }
            }

            try {
                const shape = new CANNON.ConvexPolyhedron({ vertices, faces });
                body.addShape(shape);
            } catch (e) {
                // Safe fallback if vertex ripping fails
                body.addShape(new CANNON.Sphere(meta.radius || 5)); 
            }
        }

        function getMaxSides() { return Math.min(48, 8 + (save.upgrades.nth || 0) * 2 + (save.prestigeUnlocked ? 6 : 0)); }

        function getSpawnInterval() { 
            // Base 3.0s, Nth reduces slightly, Superposition reduces by 1.5% per level (multiplicative)
            const superpositionMult = Math.pow(0.985, Math.min(226, save.upgrades.superposition || 0));
            let base = Math.max(0.3, 3.0 - (save.upgrades.nth || 0) * 0.25);
            return base * superpositionMult;
        }
        function getGravityScale() { return 1 + (save.upgrades.accelerator || 0) * 0.45; }
        function getQentChance() { return Math.min(0.7, 0.15 * (save.upgrades.qent || 0)); }
        function getQentRadius() { return 12 + (save.upgrades.qent || 0) * 10; }
        function getCosmicChance() { return (save.upgrades.cosmic || 0) * 0.06; }

        let spawnAccumulator = 0;
        function spawnRandom() {
            const entChance = Math.min(5.0, (save.upgrades.entanglement || 0) * 0.05);
            const extraSpawns = Math.floor(entChance) + (Math.random() < (entChance % 1) ? 1 : 0);
            for (let i = 0; i <= extraSpawns; i++) {
                setTimeout(() => {
                    const bhLevel = save.upgrades.blackhole || 0;
                    if (bhLevel > 0 && Math.random() < 0.001 * (1 + bhLevel * 4)) {
                        spawnShape(true); if(i===0) pushMsg('Black-hole shape dropped!'); sfxBlackhole(); return;
                    }
                    if (Math.random() < 0.12) spawnPlatonic('dodeca'); else spawnShape(false);
                }, i * 150);
            }
        }

        function spawnPlatonic(type) {
            const mesh = createPlatonicMesh(type);
            mesh.position.set((Math.random() - 0.5) * 300, 130 + Math.random() * 50, (Math.random() - 0.5) * 80);            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            scene.add(mesh);

            const mass = (type === 'dodeca') ? 6 : 3;
            const body = new CANNON.Body({ mass, material: new CANNON.Material() });

            const pts = (type === 'dodeca') ? 12 : (type === 'cube' ? 6 : 8);
            const meta = { type: 'platonic', pts, isBlack: false, isDark: false, hp: pts * 4, hpMax: pts * 4 };

            attachCannonShape(body, meta, mesh);

            body.position.copy(mesh.position);
            body.quaternion.copy(mesh.quaternion);
            body.velocity.set(0, -10 - Math.random() * 10, 0); // Straight down
            
            body.linearDamping = 0.1;
            body.angularDamping = 0.1;  
            world.addBody(body);

            objects.push({ mesh, body, meta });
            enableCollisionEvents(body, objects[objects.length - 1]);
        }

        function spawnShape(isBlack = false) {
            const maxSides = getMaxSides();
            const sides = Math.floor(rng(4, Math.max(4, maxSides)));
            const radius = 3 + (sides - 4) * 0.45;
            const height = 5 + Math.random() * 8;
            const mesh = createPrismMesh(sides, radius, height);

            const isDark = Math.random() < getCosmicChance();
            if (isDark) {
                mesh.material = new THREE.MeshStandardMaterial({ color: 0x001020, emissive: 0x002233, transparent: true, opacity: 0.22, flatShading: true });
            } else if (isBlack) {
                mesh.material = new THREE.MeshStandardMaterial({ color: 0x06060a, emissive: 0x5a00ff, metalness: 0.7, roughness: 0.2, flatShading: true });
            }
            // Spawn randomly strictly across X axis, high up
            mesh.position.set((Math.random() - 0.5) * 300, 130 + Math.random() * 50, (Math.random() - 0.5) * 80);            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            scene.add(mesh);

            const mass = 1 + sides * 0.3 + (isBlack) ? 10 :0;
            const body = new CANNON.Body({ mass });

            const meta = { type: 'prism', sides, radius, height, pts: sides, isBlack: !!isBlack, isDark: !!isDark, hp: sides * 3 + (isBlack ? 40 : 0), hpMax: sides * 3 + (isBlack ? 40 : 0) };
            attachCannonShape(body, meta, mesh);

            body.position.copy(mesh.position);
            body.quaternion.copy(mesh.quaternion);
            let velScale = (isBlack) ? rng(2, 4) : 1;
            body.velocity.set(0, -10 * velScale - Math.random() * 10, 0); // Straight down
            
            body.linearDamping = (isBlack) ?-.5:0.1;
            body.angularDamping = (isBlack) ?-.5:0.1;
            world.addBody(body);
            objects.push({ mesh, body, meta });
            enableCollisionEvents(body, objects[objects.length - 1]);
        }

        function enableCollisionEvents(body, objRef) {
            body.addEventListener('collide', (ev) => {
                if (ev.body === groundBody) {
                    const accLevel = save.upgrades.accelerator || 0;
                    if (accLevel >= 5 && !objRef.removing && objRef.meta.type === 'prism' && !objRef.meta.isBlack) {
                        if (Math.random() < (accLevel + 5)/1000)
                        shatterObject(objRef, { auto: true });
                    }
                }
            });
        }

        function rebuildBodyFromMesh(objRef) {
            try {
                const old = objRef.body;
                const mass = old ? old.mass : Math.max(1, (objRef.meta.pts || 4) * 0.4);
                const pos = old ? old.position.clone() : new CANNON.Vec3().copy(objRef.mesh.position);
                const quat = old ? old.quaternion.clone() : new CANNON.Quaternion().copy(objRef.mesh.quaternion);
                const vel = old ? old.velocity.clone() : new CANNON.Vec3();
                const ang = old ? old.angularVelocity.clone() : new CANNON.Vec3();

                if (old) try { world.removeBody(old); } catch (e) { }

                const b = new CANNON.Body({ mass });
                attachCannonShape(b, objRef.meta, objRef.mesh);

                b.position.copy(pos); b.quaternion.copy(quat);
                b.velocity.copy(vel); b.angularVelocity.copy(ang);
                world.addBody(b);

                objRef.body = b;
                enableCollisionEvents(b, objRef);
            } catch (e) { console.warn('rebuild fail', e); }
        }

        function updateDamageVisual(objRef, prevHp, newHp) {
            if (!objRef || objRef.removing || !objRef.meta.pts) return;
            const meta = objRef.meta;
            const frac = Math.max(0.0, Math.min(1.0, newHp / (meta.hpMax || 1)));
            const targetSides = Math.max(3, Math.round(meta.pts * frac));

            if (meta.type === 'prism' && targetSides !== meta.sides && targetSides > 2) {
                const newGeom = new THREE.CylinderGeometry(meta.radius, meta.radius, meta.height, targetSides, 1, false);
                objRef.mesh.geometry.dispose();
                objRef.mesh.geometry = newGeom;
                meta.sides = targetSides;
                meta.pts = targetSides;
                rebuildBodyFromMesh(objRef);
            }
        }

        function damageEntity(objRef, amount, impulse = null) {
            if (!objRef || objRef.removing) return;
            const meta = objRef.meta;
            const prevHp = meta.hp;
            meta.hp -= amount;

            try {
                const mat = objRef.mesh.material;
                if (mat) {
                    mat.emissive.setHex(0xff0033);
                    mat.emissiveIntensity = 1.4;
                    setTimeout(() => {
                        try { 
                            if (!objRef.removing) {
                                // Restore correct base emissive
                                if (meta.isBlack) mat.emissive.setHex(0x5a00ff);
                                else if (meta.isDark) mat.emissive.setHex(0x002233);
                                else mat.emissive.setHex(0x000000);
                                mat.emissiveIntensity = 1;
                            }
                        } catch (e) { }
                    }, 200);
                }
            } catch (e) { }

            updateDamageVisual(objRef, prevHp, meta.hp);

            if (impulse && objRef.body) {
                const push = new CANNON.Vec3(impulse.x * 0.08, impulse.y * 0.08, impulse.z * 0.08);
                objRef.body.velocity.vadd(push, objRef.body.velocity);
            }

            sfxBeep(120 + Math.random() * 400, 0.06, 'triangle', 0.03);

            if (meta.hp <= 0) {
                causeCameraShake(0.6, 0.12);
                shatterObject(objRef, { impulse: impulse || (objRef.body ? objRef.body.velocity.clone() : new CANNON.Vec3()) });
            }
        }

        function tryCursorHit(objRef, speed, impulseVec3) {
            if (!objRef || objRef.removing) return;
            // FIX: Normalizing damage so it isn't an instant 1-hit kill.
            // Caps at a reasonable amount per swipe.
            const damage = Math.min(12, Math.max(1, Math.floor(speed * 0.3)));
            damageEntity(objRef, damage, new CANNON.Vec3(impulseVec3.x, impulseVec3.y, impulseVec3.z));
        }

        /* =========================
           Shatter
           ========================= */
        function shatterObject(objRef, opts = {}) {
            if (!objRef || objRef.removing) return;
            objRef.removing = true;
            const meta = objRef.meta || {};
            let basePoints = meta.pts || (meta.sides || 4);

            if (meta.isBlack) {
                save.score += basePoints * 40 + rng(200, 1000) | 0;
                if (Math.random() < 0.12) {
                    save.currencies.planck = (save.currencies.planck || 0) + 1; pushMsg('You earned 1ℓ.');
                } else {
                    pushMsg('Destroyed Negative Geometry.');
                }
            } else {
                const dup = save.upgrades.duplicator || 0;
                const multiplier = 1 + dup;
                const darkBonus = meta.isDark ? 10 : 0; // dark matter bonus
                save.score += Math.floor((basePoints + darkBonus) * multiplier);
            }
            save.destroyed = (save.destroyed || 0) + 1;
            updateHUD(); sfxShatter();

            const qLevel = save.upgrades.qent || 0;
            if (qLevel && Math.random() < getQentChance()) {
                const radius = getQentRadius();
                const near = objects.filter(o => o !== objRef && !o.removing && o.mesh.position.distanceTo(cursorMesh.position) <= radius).slice(0, Math.min(4, qLevel + 1));
                near.forEach((n, i) => setTimeout(() => shatterObject(n, { impulse: new THREE.Vector3((Math.random() - 0.5) * 6, Math.random() * 3 + 1, (Math.random() - 0.5) * 6) }), 80 + i * 60));
            }

            // FIX: Replaced massive triangle loop with controlled debris generation
            const mesh = objRef.mesh;
            const shardCount = Math.min(8, Math.max(3, Math.floor(basePoints / 2)));

            for (let i = 0; i < shardCount; i++) {
                const shardGeom = new THREE.TetrahedronGeometry(meta.radius ? meta.radius * 0.4 : 1.5);
                const shardMat = new THREE.MeshStandardMaterial({ color: mesh.material.color.clone(), flatShading: true });
                const shardMesh = new THREE.Mesh(shardGeom, shardMat);
                shardMesh.castShadow = true;

                const offset = new THREE.Vector3((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3);
                shardMesh.position.copy(mesh.position).add(offset);
                scene.add(shardMesh);

                const body = new CANNON.Body({ mass: 0.1, shape: new CANNON.Box(new CANNON.Vec3(1, 1, 1)) });
                const impulse = opts.impulse ? new CANNON.Vec3(opts.impulse.x, opts.impulse.y, opts.impulse.z) : new CANNON.Vec3((Math.random() - 0.5) * 6, Math.random() * 6 + 2, (Math.random() - 0.5) * 6);

                body.position.copy(shardMesh.position);
                world.addBody(body);
                body.angularVelocity.set((Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15);
                body.velocity.copy(impulse);
                // Lower life expectancy for cleaner garbage collection
                debrisObjects.push({ mesh: shardMesh, body, meta: { life: 1.5 + Math.random() * 1.5 } });
            }

            try { world.removeBody(objRef.body); scene.remove(objRef.mesh); } catch (e) { }
            const idx = objects.indexOf(objRef);
            if (idx >= 0) objects.splice(idx, 1);
            saveNow();
        }

        /* =========================
           Main loop
           ========================= */
        let lastTime = performance.now();
        let cameraShake = { amt: 0, duration: 0 };
        function animate(now = 0) {
            requestAnimationFrame(animate);
            const dt = Math.min(1 / 30, (now - lastTime) / 1000);
            lastTime = now;

            // WASD Movement implementation alongside OrbitControls
            const moveSpeed = 60 * dt;
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();

            if (keys.w) { camera.position.addScaledVector(forward, moveSpeed); controls.target.addScaledVector(forward, moveSpeed); }
            if (keys.s) { camera.position.addScaledVector(forward, -moveSpeed); controls.target.addScaledVector(forward, -moveSpeed); }
            if (keys.a) { camera.position.addScaledVector(right, -moveSpeed); controls.target.addScaledVector(right, -moveSpeed); }
            if (keys.d) { camera.position.addScaledVector(right, moveSpeed); controls.target.addScaledVector(right, moveSpeed); }

            spawnAccumulator += dt;
            if (spawnAccumulator > getSpawnInterval()) { spawnAccumulator = 0; spawnRandom(); }

            updateCursorFromPointer();

            const dx = pointer.x - prevPointer.x;
            const dy = pointer.y - prevPointer.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const swipeSpeed = dist / Math.max(dt, 0.001);

            let isSlicing = false;

            if (swipeSpeed > 1.2) {
                isSlicing = true;
                const impulse3D = new THREE.Vector3(dx, dy, 0).normalize().multiplyScalar(swipeSpeed * 15);
                impulse3D.applyQuaternion(camera.quaternion);
                impulse3D.add(new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).multiplyScalar(swipeSpeed * 0.2));

                const steps = Math.max(1, Math.ceil(dist / 0.05));
                for (let i = 1; i <= steps; i++) {
                    const lx = prevPointer.x + dx * (i / steps);
                    const ly = prevPointer.y + dy * (i / steps);
                    raycaster.setFromCamera({ x: lx, y: ly }, camera);

                    const intersects = raycaster.intersectObjects(objects.map(o => o.mesh));
                    if (intersects.length > 0) {
                        const hit = intersects[0].object;
                        const objRef = objects.find(o => o.mesh === hit);
                        if (objRef && !objRef.meta.hitThisFrame) {
                            objRef.meta.hitThisFrame = true;
                            tryCursorHit(objRef, swipeSpeed, impulse3D);
                        }
                    }
                }
            }

            updateTrail(isSlicing);

            objects.forEach(o => { if (o.meta) o.meta.hitThisFrame = false; });
            prevPointer.x = pointer.x;
            prevPointer.y = pointer.y;

            world.gravity.set(0, -9.82 * getGravityScale(), 0);
            world.step(1 / 60, dt, 4);
            
            // --- UPDATE GRID BENDING ---
            const positions = groundMesh.geometry.attributes.position.array;
            const original = groundMesh.geometry.userData.originalPositions;
            
            // 1. Reset vertices to original flat state every frame
            for(let i = 0; i < positions.length; i += 3) {
                positions[i + 2] = original[i + 2]; 
            }

            // 2. Apply active impacts
            for (let j = groundImpacts.length - 1; j >= 0; j--) {
                // ground impacts each element has x,y,force.
                const impact = groundImpacts[j];
                impact.time += dt * 4.0 + (impact.force / 1000); // Ripple speed
                
                if (impact.time > Math.PI) {
                    groundImpacts.splice(j, 1);
                    continue;
                }
                
                const wave = -Math.sin(impact.time) * Math.exp(-impact.time * 0.5);
                const radiusSq = 1600 * (1 + impact.force/3 * 0.5);
                const falloff = 200 * (1 + impact.force/3 * 0.5);

                for(let i = 0; i < positions.length; i += 3) {
                    const localX = original[i];
                    const localY = original[i + 1]; 
                    
                    // CORRECT MAPPING: Plane's local Y acts as world -Z because of the -Math.PI/2 rotation
                    const worldX = localX;
                    const worldZ = -localY; 
                    
                    const dx = worldX - impact.x;
                    const dz = worldZ - impact.z;
                    const distSq = dx * dx + dz * dz;
                    
                    if (distSq < radiusSq) { 
                        const influence = Math.exp(-distSq / falloff);
                        positions[i + 2] += influence * wave * impact.force * 0.8; 
                    }
                }
            }
            groundMesh.geometry.attributes.position.needsUpdate = true;

            // // --- UPDATE GRID BENDING ---
            // const positions = groundMesh.geometry.attributes.position.array;
            // const original = groundMesh.geometry.userData.originalPositions;
            
            // // 1. Reset vertices to original flat state every frame
            // for(let i = 0; i < positions.length; i += 3) {
            //     positions[i + 2] = original[i + 2]; // Local Z axis is up/down after rotation
            // }

            // // 2. Apply active impacts
            // for (let j = groundImpacts.length - 1; j >= 0; j--) {
            //     const impact = groundImpacts[j];
            //     impact.time += dt * 4.0; // Ripple speed
                
            //     // Remove impact once animation finishes
            //     if (impact.time > Math.PI) {
            //         groundImpacts.splice(j, 1);
            //         continue;
            //     }
                
            //     // Downward math wave: starts at 0, goes negative (down), returns to 0
            //     const wave = -Math.sin(impact.time) * Math.exp(-impact.time * 0.5);
                
            //     for(let i = 0; i < positions.length; i += 3) {
            //         const vx = original[i];
            //         const vy = original[i + 1]; // Plane's local Y acts as world Z
                    
            //         const dx = vx - impact.x;
            //         const dz = vy - impact.z;
            //         const distSq = dx * dx + dz * dz;
                    
            //         if (distSq < 1600) { // Limit effect radius to optimize and contain visual
            //             const influence = Math.exp(-distSq / 200);
            //             // Displace vertex downward
            //             positions[i + 2] += influence * wave * impact.force * 0.8; 
            //         }
            //     }
            // }
            // groundMesh.geometry.attributes.position.needsUpdate = true;

            // --- UPDATE PARTICLES ---
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= dt;
                
                // Gravity pulling particles back down
                p.vel.y -= 40 * dt; 
                p.mesh.position.addScaledVector(p.vel, dt);
                
                // Shrink particles as they die
                p.mesh.scale.setScalar(p.life);
                
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            // Clean up objects that fell into the void
            for (let i = objects.length - 1; i >= 0; i--) {
                const o = objects[i];
                o.mesh.position.copy(o.body.position);
                o.mesh.quaternion.copy(o.body.quaternion);

                if (o.body.position.y < -80) {
                    try { world.removeBody(o.body); scene.remove(o.mesh); } catch (e) { }
                    objects.splice(i, 1);
                }
            }

            for (let i = debrisObjects.length - 1; i >= 0; i--) {
                const d = debrisObjects[i];
                d.mesh.position.copy(d.body.position); d.mesh.quaternion.copy(d.body.quaternion);
                d.meta.life -= dt;
                if (d.meta.life <= 0 || d.body.position.y < -80) {
                    try { world.removeBody(d.body); scene.remove(d.mesh); } catch (e) { }
                    debrisObjects.splice(i, 1);
                }
            }

            if (cameraShake.duration > 0) {
                cameraShake.duration -= dt;
                camera.position.x += (Math.random() - 0.5) * cameraShake.amt;
                camera.position.y += (Math.random() - 0.5) * cameraShake.amt * 0.4;
                cameraShake.amt *= 0.97;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function causeCameraShake(intensity = 0.6, duration = 0.18) { cameraShake.amt = intensity; cameraShake.duration = duration; }

        updateHUD(); animate(performance.now());
        for (let i = 0; i < 3; i++) spawnRandom();

        setInterval(() => saveNow(), 5000);
