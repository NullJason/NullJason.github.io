<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullJason's Project Showcase</title>
    <style>
        /* Sleek/Modern CSS Variables for Themeing */
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --tag-bg: #eff6ff;
            --tag-text: #1e40af;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --modal-bg: #ffffff;
            --panel-shadow: -4px 0 15px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --border-color: #334155;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --tag-bg: #1e3a8a;
            --tag-text: #bfdbfe;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.7);
            --modal-overlay: rgba(0, 0, 0, 0.8);
            --modal-bg: #1e293b;
            --panel-shadow: -4px 0 15px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden; /* Prevent horizontal scroll when panel is hidden */
        }

        /* Header & Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 { margin: 0; font-size: 2.5em; font-weight: 800; letter-spacing: -0.02em; }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover { background: var(--border-color); }

        .hamburger-btn {
            font-size: 1.2em;
            padding: 8px 14px;
            border-radius: 8px; /* Slightly different shape for the menu */
        }

        /* Slide-in Panel */
        .panel-overlay {
            position: fixed;
            inset: 0;
            background-color: var(--modal-overlay);
            backdrop-filter: blur(2px);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .panel-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .side-panel {
            position: fixed;
            top: 0;
            right: -320px; /* Hide off-screen */
            width: 320px;
            height: 100vh;
            background-color: var(--card-bg);
            border-left: 1px solid var(--border-color);
            z-index: 999;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--panel-shadow);
            display: flex;
            flex-direction: column;
        }

        .side-panel.active {
            right: 0;
        }

        .panel-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            margin: 0;
            font-size: 1.2em;
        }

        .close-panel-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-panel-btn:hover { color: var(--text-color); }

        .panel-links {
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .panel-links a {
            padding: 15px 25px;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s, color 0.2s;
            border-left: 3px solid transparent;
        }

        .panel-links a:hover {
            background-color: var(--bg-color);
            border-left-color: var(--primary);
            color: var(--primary);
        }

        /* Section Styles */
        .category-section { margin-bottom: 50px; }
        .category-title {
            font-size: 1.8em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        /* Grid Styles */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .project-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .project-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .project-item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .project-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .project-title {
            font-size: 1.25em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .project-desc {
            font-size: 0.95em;
            color: var(--text-muted);
            margin-bottom: 20px;
            flex-grow: 1;
            line-height: 1.5;
        }

        /* Tag Styles */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .tag {
            font-size: 0.75em;
            padding: 4px 10px;
            background-color: var(--tag-bg);
            color: var(--tag-text);
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Modal Styles */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000; /* Ensure modal is above everything */
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: var(--modal-overlay); 
            backdrop-filter: blur(4px);
            justify-content: center; align-items: center;
        }

        .modal-content {
            background-color: var(--modal-bg);
            color: var(--text-color);
            padding: 30px;
            border-radius: 16px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
        }

        .close-button {
            position: absolute; top: 20px; right: 25px;
            color: var(--text-muted); font-size: 28px; font-weight: bold;
            cursor: pointer; line-height: 1; transition: color 0.2s;
        }
        .close-button:hover { color: var(--text-color); }

        .modal-image {
            width: 100%; height: auto; max-height: 350px;
            object-fit: cover; border-radius: 8px; margin-bottom: 20px;
            background-color: var(--border-color);
        }

        .modal-title { font-size: 2em; font-weight: 800; margin-bottom: 10px; }
        .modal-tags { margin-bottom: 20px; }
        .modal-long-desc { margin-bottom: 30px; line-height: 1.7; color: var(--text-muted); }

        .modal-actions { display: flex; gap: 12px; }
        .modal-actions button, .modal-actions a {
            padding: 10px 24px; cursor: pointer; border: none;
            border-radius: 8px; font-weight: 600; font-size: 1em;
            text-decoration: none; display: inline-block;
            transition: all 0.2s;
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }

        /* Loader */
        .loader {
            text-align: center; padding: 40px; color: var(--text-muted);
            font-weight: 600; font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Projects</h1>
        <div class="header-controls">
            <button class="icon-btn theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️ Light Mode</button>
            <button class="icon-btn hamburger-btn" onclick="toggleMenu()">☰</button>
        </div>
    </header>

    <div class="panel-overlay" id="panel-overlay" onclick="toggleMenu()"></div>
    <nav class="side-panel" id="side-panel">
        <div class="panel-header">
            <h3>Navigation</h3>
            <button class="close-panel-btn" onclick="toggleMenu()">&times;</button>
        </div>
        <div class="panel-links">
            <a href="https://nulljason.github.io/">Home</a>
            </div>
    </nav>
    
    <div id="content-container">
        <div class="loader" id="loader">Fetching projects from GitHub...</div>
    </div>

    <div id="project-modal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <img id="modal-image" class="modal-image" src="" alt="Project Image" style="display:none;">
            <h2 id="modal-title" class="modal-title"></h2>
            <div id="modal-tags" class="tags-container modal-tags"></div>
            <p id="modal-long-desc" class="modal-long-desc"></p>
            <div class="modal-actions">
                <a id="modal-link" href="#" target="_blank" class="btn-primary">View Project</a>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = 'NullJason';
        
        let projects = [
            {
                id: 'dodeca-drop',
                title: "Dodeca Drop",
                shortDesc: "Break 2D geometry with the shrapnel of the mouse.",
                longDesc: "A 2D physics-based sim where the objective is to clear the screen by breaking geometric shapes.",
                link: "dodecaDrop.html",
                imageUrl: "Icons/geodropIcon.png", 
                category: "Entertainment",
                tags: ["Web Project", "Physics"]
            },
            {
                id: 'geometry-sim',
                title: "Geometry Crunch",
                shortDesc: "3D Version of Dodeca Drop, shapes to your heart's content.",
                longDesc: "This is a fully 3D interactive physics simulation in the form of a game, Enjoy.",
                link: "geometrySim.html",
                imageUrl: "Icons/GeoCrushIcon.png",
                category: "Entertainment",
                tags: ["3D", "WIP"]
            },
            {
                id: 'cpu-sim',
                title: "CPU Simulator",
                shortDesc: "Macroarch visual explorer (MAVE)",
                longDesc: "Interactive Visualizers including CPU visuals & toy ISA. A work-in-progress project aimed at teaching computer architecture fundamentals.",
                link: "MAVE_Hub.html",
                imageUrl: "Icons/MAVEIcon.png",
                category: "Education",
                tags: ["Computer Architecture", "WIP"]
            },
            {
                id: 'firework',
                title: "Explosives",
                shortDesc: "Watch the fireworks(?) cascading through the spacescape.",
                longDesc: "Use and watch some questionable explosives. Web Graphics woohoo.",
                link: "RealisticExplosions.html",
                imageUrl: "Icons/explosivesIcon.png",
                category: "Entertainment",
                tags: ["Graphics", "WIP"]
            },
            {
                id: 'universe-sandbox',
                title: "Universe Sandbox 2D",
                shortDesc: "A 2D Sandbox that allows you to merge planets, shoot debris, and much more.",
                longDesc: "This sandbox is a attempt at making a 2D version of Universe Sandbox 2 that can be played on the web.",
                link: "2DUniSandboxSim.html",
                imageUrl: "Icons/Uni2DIcon.png",
                category: "Entertainment",
                tags: ["3D","Physics","Graphics", "WIP"]
            }
        ];

        const explicitRepos = {
            // 'TrashyCollector': { category: 'Entertainment', tags: ['Game Dev', 'C#'] },
            'Decked-Out-Shuffled': { category: 'Entertainment', tags: ['Game Dev', 'Card Game'] },
            'DungeonCrawler': { category: 'Entertainment', tags: ['Game', 'RPG'] }
        };

        // Theme Logic
        function toggleTheme() {
            const html = document.documentElement;
            const toggleBtn = document.getElementById('theme-toggle');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                toggleBtn.textContent = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Initialize Theme (Default to Dark)
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('theme-toggle').textContent = '🌙 Dark Mode';
        } else {
            // Dark is default, HTML tag is already set, just update button text
            document.getElementById('theme-toggle').textContent = '☀️ Light Mode';
        }

        // Menu Toggle Logic
        function toggleMenu() {
            const panel = document.getElementById('side-panel');
            const overlay = document.getElementById('panel-overlay');
            panel.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        async function fetchProjectIcon(repoName) {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${repoName}/contents/`);
                if (!response.ok) return null;
                const contents = await response.json();
                
                const iconFile = contents.find(file => file.name.toLowerCase().startsWith('projecticon.'));
                return iconFile ? iconFile.download_url : null;
            } catch (error) {
                console.error(`Error fetching icon for ${repoName}:`, error);
                return null;
            }
        }

        async function fetchGitHubData() {
            // 1. Check if another page already did the heavy lifting this session
            const cachedData = sessionStorage.getItem('github_projects');
            
            if (cachedData) {
                projects = JSON.parse(cachedData); // Load from memory instantly
                renderPage();
                return; // Stop here, no need to call the GitHub API!
            }

            // 2. If no cache exists, fetch from GitHub
            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=100`);
                if (!response.ok) throw new Error("GitHub API limit likely reached");
                const repos = await response.json();

                for (const repo of repos) {
                    if (repo.name.toLowerCase() === 'nulljason.github.io') continue;

                    let category = 'Others';
                    let tags = [repo.language].filter(Boolean); 

                    if (explicitRepos[repo.name]) {
                        category = explicitRepos[repo.name].category;
                        tags = [...tags, ...explicitRepos[repo.name].tags];
                    }

                    if (!projects.find(p => p.title === repo.name)) {
                        let newProject = {
                            id: repo.name,
                            title: repo.name,
                            shortDesc: repo.description || "No description provided.",
                            longDesc: repo.description || "No detailed description available for this repository.",
                            link: repo.html_url,
                            imageUrl: "", 
                            category: category,
                            tags: [...new Set(tags)] 
                        };
                        projects.push(newProject);
                        
                        // Async image fetching
                        fetchProjectIcon(repo.name).then(iconUrl => {
                            if (iconUrl) {
                                newProject.imageUrl = iconUrl;
                                const imgElement = document.getElementById(`img-${repo.name}`);
                                if (imgElement) {
                                    imgElement.src = iconUrl;
                                    imgElement.style.display = 'block';
                                }
                                // cache every time an image is found
                                // so the index.html gets imgs too!
                                sessionStorage.setItem('github_projects', JSON.stringify(projects));
                            }
                        });
                    }
                }
                
                // Save the initial text data immediately so the UI doesn't have to wait
                sessionStorage.setItem('github_projects', JSON.stringify(projects));

            } catch (error) {
                console.error("Could not fetch from GitHub:", error);
            }

            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('content-container');
            container.innerHTML = ''; 

            const grouped = projects.reduce((acc, project) => {
                if (!acc[project.category]) acc[project.category] = [];
                acc[project.category].push(project);
                return acc;
            }, {});

            const categoryOrder = ['Education', 'Entertainment', 'Others'];
            
            Object.keys(grouped).forEach(cat => {
                if (!categoryOrder.includes(cat)) categoryOrder.push(cat);
            });

            categoryOrder.forEach(category => {
                if (!grouped[category] || grouped[category].length === 0) return;

                const section = document.createElement('div');
                section.className = 'category-section';
                
                section.innerHTML = `
                    <h2 class="category-title">${category}</h2>
                    <div class="grid-container" id="grid-${category}"></div>
                `;
                container.appendChild(section);

                const grid = section.querySelector('.grid-container');

                grouped[category].forEach(project => {
                    const item = document.createElement('div');
                    item.className = 'project-item';
                    
                    const tagsHTML = project.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
                    
                    // Use a transparent pixel instead of a broken image icon before loading
                    const imgSrc = project.imageUrl || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';

                    item.innerHTML = `
                        <img id="img-${project.id}" src="${imgSrc}" alt="${project.title}">
                        <div class="project-info">
                            <div class="project-title">${project.title}</div>
                            <p class="project-desc">${project.shortDesc}</p>
                            <div class="tags-container">${tagsHTML}</div>
                        </div>
                    `;
                    item.onclick = () => openModal(project);
                    grid.appendChild(item);
                });
            });
        }

        // Modal Logic
        const modal = document.getElementById('project-modal');
        
        function openModal(project) {
            document.getElementById('modal-title').textContent = project.title;
            document.getElementById('modal-long-desc').textContent = project.longDesc;
            document.getElementById('modal-tags').innerHTML = project.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            
            const imgElement = document.getElementById('modal-image');
            if (project.imageUrl) {
                imgElement.src = project.imageUrl;
                imgElement.style.display = 'block';
            } else {
                imgElement.style.display = 'none';
            }

            document.getElementById('modal-link').href = project.link;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Close modals/panels when clicking outside
        window.onclick = function(event) {
            if (event.target === modal) {
                closeModal();
            }
        }

        document.addEventListener('DOMContentLoaded', fetchGitHubData);
    </script>
</body>
</html>
